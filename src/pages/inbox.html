<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Inbox | Fexend</title>

        <link rel="icon" type="image/png" href="/public/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
        <link rel="shortcut icon" href="/public/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="/public/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="Fexend" />
        <link rel="manifest" href="/public/site.webmanifest" />

        <link rel="stylesheet" href="/public/css/app.css" />
        <script defer src="/public/js/app.js"></script>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />

        <script>
            if (
                localStorage.getItem("darkMode") === "true" ||
                (!localStorage.getItem("darkMode") &&
                    window.matchMedia("(prefers-color-scheme: dark)").matches)
            ) {
                document.documentElement.classList.add("dark");
            }
        </script>
        <style>
            [x-cloak] {
                display: none !important;
            }
            #loading-screen {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #f1f5f9;
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                transition: opacity 0.3s ease-out;
            }
            .dark #loading-screen {
                background-color: #020617;
            }
        </style>
    </head>
    <body
        x-data="{
            darkMode: localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches),
            sidebarOpen: false,
            mobileMenuOpen: false,
            isMobile: window.innerWidth < 768,
            toggleDarkMode() {
                this.darkMode = !this.darkMode;
                localStorage.setItem('darkMode', this.darkMode);
                if (this.darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }
        }"
        x-init="
            window.addEventListener('resize', () => {
                if (window.innerWidth < 1024) sidebarOpen = false;
                isMobile = window.innerWidth < 768;
                if (!isMobile) mobileMenuOpen = false;
            });
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                }, 300);
            }, 500);
        "
    >
        <!-- Loading Screen -->
        <div
            id="loading-screen"
            class="fixed inset-0 bg-background dark:bg-background-dark flex justify-center items-center z-9999 transition-opacity duration-300"
        >
            <div class="flex space-x-2">
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
            </div>
        </div>

        <main class="main-content">
            <!-- Navbar -->
            <header class="navbar-layout">
                <nav>
                    <div class="px-3 py-3 lg:px-5 lg:pl-3">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <button
                                    @click="sidebarOpen = !sidebarOpen"
                                    :aria-expanded="sidebarOpen"
                                    aria-label="Toggle sidebar"
                                    class="navbar-button"
                                >
                                    <svg
                                        x-show="!sidebarOpen"
                                        xmlns="http://www.w3.org/2000/svg"
                                        class="icon icon-tabler icon-tabler-menu-2 w-6 h-6 dark:text-gray-200"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        fill="none"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    >
                                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                        <line x1="4" y1="6" x2="20" y2="6" />
                                        <line x1="4" y1="12" x2="20" y2="12" />
                                        <line x1="4" y1="18" x2="20" y2="18" />
                                    </svg>
                                    <svg
                                        x-show="sidebarOpen"
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="icon icon-tabler icons-tabler-outline icon-tabler-x"
                                    >
                                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                        <path d="M18 6l-12 12" />
                                        <path d="M6 6l12 12" />
                                    </svg>
                                </button>
                                <span class="nav-title"><a href="/src">Fexend</a></span>
                            </div>

                            <div class="flex items-center gap-4">
                                <!-- Notifications -->
                                <div
                                    class="relative"
                                    x-data="{
                                        notificationOpen: false,
                                        activeTab: 'unread',
                                    }"
                                >
                                    <button
                                        class="navbar-button relative"
                                        @click="notificationOpen = !notificationOpen"
                                        :aria-expanded="notificationOpen"
                                        aria-label="Notifications"
                                    >
                                        <svg
                                            xmlns="http://www.w3.org/2000/svg"
                                            class="icon icon-tabler icon-tabler-bell w-6 h-6 dark:text-gray-200"
                                            width="24"
                                            height="24"
                                            viewBox="0 0 24 24"
                                            stroke-width="1.5"
                                            stroke="currentColor"
                                            fill="none"
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                        >
                                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                            <path d="M10 5a2 2 0 0 1 4 0a7 7 0 0 1 4 6v3a1 1 0 0 0 .293 .707l1 1a1 1 0 0 1 -.707 1.707h-14a1 1 0 0 1 -.707 -1.707l1 -1a1 1 0 0 0 .293 -.707v-3a7 7 0 0 1 4 -6" />
                                            <path d="M9 17h6" />
                                        </svg>
                                        <span class="navbar-notification-badge"></span>
                                    </button>
                                    <div
                                        x-show="notificationOpen"
                                        @click.away="notificationOpen = false"
                                        x-transition
                                        class="fixed inset-x-2 top-16 sm:absolute sm:inset-x-auto sm:right-0 sm:top-auto sm:mt-2 sm:w-80 w-auto bg-white dark:bg-slate-800 rounded-lg shadow-lg z-50"
                                    >
                                        <div class="p-4 border-b border-slate-200 dark:border-slate-700">
                                            <div>
                                                <button @click="activeTab = 'unread'" :class="{'font-bold': activeTab==='unread'}" class="mr-4">Unread</button>
                                                <button @click="activeTab = 'read'" :class="{'font-bold': activeTab==='read'}">Read</button>
                                            </div>
                                        </div>
                                        <div class="max-h-64 overflow-y-auto p-4">
                                            <template x-if="activeTab==='unread'">
                                                <div>
                                                    <div class="text-sm mb-2"><button class="hover:underline">Mark all as read</button></div>
                                                    <ul><li class="p-2 text-slate-500">No unread notifications.</li></ul>
                                                </div>
                                            </template>
                                            <template x-if="activeTab==='read'">
                                                <div>
                                                    <div class="text-sm mb-2"><button class="mr-2 hover:underline">Clear</button></div>
                                                    <ul><li class="p-2 text-slate-500">No read notifications.</li></ul>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>

                                <!-- Dark Mode Toggle -->
                                <button
                                    @click="toggleDarkMode()"
                                    :aria-label="darkMode ? 'Switch to light mode' : 'Switch to dark mode'"
                                    class="navbar-button"
                                >
                                    <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-sun w-6 h-6" width="24" height="24" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                        <circle cx="12" cy="12" r="4" />
                                        <path d="M3 12h1M20 12h1M12 3v1M12 20v1M5.64 5.64l.707 .707M17.657 17.657l.707 .707M5.64 18.36l.707 -.707M17.657 6.343l.707 -.707" />
                                    </svg>
                                    <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-moon w-6 h-6 dark:text-gray-200">
                                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                        <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z" />
                                    </svg>
                                </button>

                                <!-- Profile Dropdown -->
                                <div x-data="{ profileOpen: false }" class="relative">
                                    <button @click="profileOpen = !profileOpen" :aria-expanded="profileOpen" aria-label="User menu" class="navbar-button">
                                        <img src="https://ui-avatars.com/api/?name=Fexend&background=615fff&color=fff" alt="User avatar" class="w-8 h-8 rounded-full" />
                                    </button>
                                    <div x-show="profileOpen" @click.away="profileOpen = false" x-transition class="absolute right-0 mt-2 w-40 bg-foreground dark:bg-foreground-dark rounded-lg shadow-lg z-10">
                                        <a href="/src/pages/profile.html" class="block px-4 py-2 text-sm">Profile</a>
                                        <a href="/src/settings/index.html" class="block px-4 py-2 text-sm">Settings</a>
                                        <a href="/src/index.html" class="block px-4 py-2 text-sm">Logout</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
            </header>
            <!-- /Navbar -->

            <!-- Sidebar -->
            <aside x-data="fexendSidebar()">
                <!-- Icon Sidebar -->
                <div class="sidebar-icon">
                    <div>
                        <div class="inline-flex h-16 w-16 items-center justify-center">
                            <a href="/src/settings/index.html" x-data="{ tooltip: false }" @mouseover="tooltip = true" @mouseleave="tooltip = false" class="sidebar-icon-button">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-settings">
                                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                    <path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065z" />
                                    <path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" />
                                </svg>
                                <span x-show="tooltip" x-transition class="absolute left-full ml-2 top-1/2 -translate-y-1/2 w-max bg-slate-800 text-white rounded py-1 px-2 whitespace-nowrap z-[100] font-normal text-sm">Settings</span>
                            </a>
                        </div>

                        <div class="border-t border-slate-100 dark:border-slate-700">
                            <div class="px-2 pt-4">
                                <ul class="space-y-1">
                                    <template x-for="item in items" :key="item.label">
                                        <li>
                                            <a :href="item.link" x-data="{ tooltip: false }" @mouseover="tooltip = true" @mouseleave="tooltip = false" class="sidebar-icon-button" :class="isActive(item) ? 'sidebar-icon-button-active' : ''">
                                                <span x-html="item.icon"></span>
                                                <span x-show="tooltip" x-transition class="absolute left-full ml-2 top-1/2 -translate-y-1/2 w-max bg-slate-800 text-white rounded py-1 px-2 whitespace-nowrap z-[100] font-normal text-sm" x-text="item.label"></span>
                                            </a>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="sidebar-footer">
                        <div class="relative" x-data="{ tooltip: false }">
                            <form action="#">
                                <button type="submit" class="sidebar-icon-button w-full justify-center" @mouseover="tooltip = true" @mouseleave="tooltip = false">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="size-5 opacity-75" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                </button>
                                <span x-show="tooltip" x-transition class="absolute left-full ml-2 top-1/2 -translate-y-1/2 w-max bg-slate-800 text-white rounded py-1 px-2 whitespace-nowrap z-[100] font-normal text-sm">Logout</span>
                            </form>
                        </div>
                    </div>
                </div>
                <!-- /Icon Sidebar -->

                <!-- Expanded Sidebar -->
                <div class="relative z-10">
                    <div
                        x-cloak
                        x-show="sidebarOpen"
                        x-transition:enter="transform transition duration-300 ease-in-out"
                        x-transition:enter-start="-translate-x-full"
                        x-transition:enter-end="translate-x-0"
                        x-transition:leave="transform transition duration-300 ease-in-out"
                        x-transition:leave-start="translate-x-0"
                        x-transition:leave-end="-translate-x-full"
                        class="sidebar-layout"
                    >
                        <div class="px-4 py-6">
                            <p class="px-4 mb-3 text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500" x-text="activeGroup.label"></p>
                            <ul class="space-y-1">
                                <template x-for="sub in activeSubMenus" :key="sub.link">
                                    <li>
                                        <a :href="sub.link" class="sidebar-link" :class="isSubActive(sub) ? 'sidebar-link-active' : ''" x-text="sub.name"></a>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </div>

                    <div
                        x-show="sidebarOpen"
                        x-transition:enter="transition-all ease-linear duration-300"
                        x-transition:enter-start="opacity-0 backdrop-blur-none"
                        x-transition:enter-end="opacity-100 backdrop-blur-sm"
                        x-transition:leave="transition-all ease-linear duration-300"
                        x-transition:leave-start="opacity-100 backdrop-blur-sm"
                        x-transition:leave-end="opacity-0 backdrop-blur-none"
                        class="sidebar-backdrop"
                        @click="sidebarOpen = false"
                    ></div>
                </div>
                <!-- /Expanded Sidebar -->
            </aside>
            <!-- /Sidebar -->

            <!-- Main Content -->
            <div
                class="main-container"
                :class="{
                    'md:ml-80': sidebarOpen,
                    'md:ml-16': !sidebarOpen,
                    'ml-0': true
                }"
            >
                <nav aria-label="Breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item">
                            <a href="/src/index.html" class="breadcrumb-link">Dashboard</a>
                        </li>
                        <li class="breadcrumb-separator" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                <path d="M9 6l6 6l-6 6" />
                            </svg>
                        </li>
                        <li class="breadcrumb-item">
                            <a href="/src/pages/index.html" class="breadcrumb-link">Pages</a>
                        </li>
                        <li class="breadcrumb-separator" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                <path d="M9 6l6 6l-6 6" />
                            </svg>
                        </li>
                        <li class="breadcrumb-item breadcrumb-active" aria-current="page">Inbox</li>
                    </ol>
                </nav>

                <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-6">Inbox</h1>

                <!-- Inbox Layout -->
                <div
                    class="card overflow-hidden"
                    x-data="{
                        selectedConv: 0,
                        newMessage: '',
                        conversations: [
                            {
                                id: 0,
                                name: 'Alice Johnson',
                                avatar: 'https://ui-avatars.com/api/?name=Alice+Johnson&background=615fff&color=fff',
                                lastMessage: 'Sure, let me check that report and get back to you.',
                                time: '10:42 AM',
                                unread: 2,
                                online: true,
                                messages: [
                                    { id: 1, text: 'Hey! Did you get a chance to review the Q3 report?', sent: false, time: '10:30 AM' },
                                    { id: 2, text: 'Yes, I looked at it briefly. There are a few numbers I want to double-check.', sent: true, time: '10:35 AM' },
                                    { id: 3, text: 'Sure, let me check that report and get back to you.', sent: false, time: '10:42 AM' },
                                ]
                            },
                            {
                                id: 1,
                                name: 'Bob Martinez',
                                avatar: 'https://ui-avatars.com/api/?name=Bob+Martinez&background=10b981&color=fff',
                                lastMessage: 'The deployment is scheduled for Friday at 2 PM.',
                                time: '9:15 AM',
                                unread: 0,
                                online: false,
                                messages: [
                                    { id: 1, text: 'When is the next deployment window?', sent: true, time: '9:00 AM' },
                                    { id: 2, text: 'The deployment is scheduled for Friday at 2 PM.', sent: false, time: '9:15 AM' },
                                    { id: 3, text: 'Perfect, I will make sure the team is ready.', sent: true, time: '9:18 AM' },
                                ]
                            },
                            {
                                id: 2,
                                name: 'Clara Nguyen',
                                avatar: 'https://ui-avatars.com/api/?name=Clara+Nguyen&background=f59e0b&color=fff',
                                lastMessage: 'Can you join the standup at 9 AM tomorrow?',
                                time: 'Yesterday',
                                unread: 1,
                                online: true,
                                messages: [
                                    { id: 1, text: 'Hi! Are you available for a quick call?', sent: false, time: 'Yesterday 3:00 PM' },
                                    { id: 2, text: 'Sure, what time works for you?', sent: true, time: 'Yesterday 3:05 PM' },
                                    { id: 3, text: 'Can you join the standup at 9 AM tomorrow?', sent: false, time: 'Yesterday 3:10 PM' },
                                    { id: 4, text: 'Will do!', sent: true, time: 'Yesterday 3:12 PM' },
                                ]
                            },
                            {
                                id: 3,
                                name: 'David Kim',
                                avatar: 'https://ui-avatars.com/api/?name=David+Kim&background=ef4444&color=fff',
                                lastMessage: 'Invoice #1042 has been sent to the client.',
                                time: 'Mon',
                                unread: 0,
                                online: false,
                                messages: [
                                    { id: 1, text: 'David, did you send the invoice yet?', sent: true, time: 'Mon 11:00 AM' },
                                    { id: 2, text: 'Just finalizing it now.', sent: false, time: 'Mon 11:15 AM' },
                                    { id: 3, text: 'Invoice #1042 has been sent to the client.', sent: false, time: 'Mon 11:30 AM' },
                                ]
                            },
                            {
                                id: 4,
                                name: 'Eva Chen',
                                avatar: 'https://ui-avatars.com/api/?name=Eva+Chen&background=8b5cf6&color=fff',
                                lastMessage: 'The new design mockups are ready for review.',
                                time: 'Sun',
                                unread: 0,
                                online: true,
                                messages: [
                                    { id: 1, text: 'The new design mockups are ready for review.', sent: false, time: 'Sun 2:00 PM' },
                                    { id: 2, text: 'Great! I will check them this evening.', sent: true, time: 'Sun 2:30 PM' },
                                    { id: 3, text: 'No rush, let me know your thoughts when ready.', sent: false, time: 'Sun 2:45 PM' },
                                ]
                            }
                        ],
                        sendMessage() {
                            if (this.newMessage.trim() === '') return;
                            const now = new Date();
                            const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                            this.conversations[this.selectedConv].messages.push({
                                id: this.conversations[this.selectedConv].messages.length + 1,
                                text: this.newMessage,
                                sent: true,
                                time: time
                            });
                            this.conversations[this.selectedConv].lastMessage = this.newMessage;
                            this.newMessage = '';
                        }
                    }"
                >
                    <div class="flex h-[calc(100vh-12rem)] min-h-[500px]">
                        <!-- Conversation List -->
                        <div class="w-full md:w-80 flex-shrink-0 border-r border-slate-200 dark:border-slate-700 flex flex-col" :class="selectedConv !== null ? 'hidden md:flex' : 'flex'">
                            <!-- Search -->
                            <div class="p-4 border-b border-slate-200 dark:border-slate-700">
                                <div class="relative">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                        <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
                                        <path d="M21 21l-6 -6" />
                                    </svg>
                                    <input type="search" placeholder="Search conversations..." class="input w-full pl-9 text-sm" />
                                </div>
                            </div>

                            <!-- Conversation Items -->
                            <div class="flex-1 overflow-y-auto">
                                <template x-for="(conv, index) in conversations" :key="conv.id">
                                    <button
                                        @click="selectedConv = index"
                                        class="w-full flex items-start gap-3 p-4 text-left hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors border-b border-slate-100 dark:border-slate-700/50"
                                        :class="selectedConv === index ? 'bg-primary/5 dark:bg-primary/10 border-l-2 border-l-primary' : ''"
                                    >
                                        <div class="relative flex-shrink-0">
                                            <img :src="conv.avatar" :alt="conv.name" class="w-10 h-10 rounded-full" />
                                            <span
                                                class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white dark:border-slate-800"
                                                :class="conv.online ? 'bg-success dark:bg-success-dark' : 'bg-slate-300 dark:bg-slate-600'"
                                            ></span>
                                        </div>
                                        <div class="flex-1 min-w-0">
                                            <div class="flex items-center justify-between mb-1">
                                                <span class="font-medium text-sm text-slate-900 dark:text-slate-100 truncate" x-text="conv.name"></span>
                                                <span class="text-xs text-slate-400 dark:text-slate-500 flex-shrink-0 ml-2" x-text="conv.time"></span>
                                            </div>
                                            <div class="flex items-center justify-between">
                                                <p class="text-xs text-slate-500 dark:text-slate-400 truncate" x-text="conv.lastMessage"></p>
                                                <span
                                                    x-show="conv.unread > 0"
                                                    class="ml-2 flex-shrink-0 w-5 h-5 rounded-full bg-primary text-white text-xs flex items-center justify-center"
                                                    x-text="conv.unread"
                                                ></span>
                                            </div>
                                        </div>
                                    </button>
                                </template>
                            </div>
                        </div>

                        <!-- Message Thread -->
                        <div class="flex-1 flex flex-col" :class="selectedConv !== null ? 'flex' : 'hidden md:flex'">
                            <!-- Message Header -->
                            <div class="flex items-center gap-3 px-4 py-3 border-b border-slate-200 dark:border-slate-700">
                                <button
                                    @click="selectedConv = null"
                                    class="md:hidden p-1 rounded hover:bg-slate-100 dark:hover:bg-slate-700"
                                    aria-label="Back to conversations"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-500" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                        <path d="M15 6l-6 6l6 6" />
                                    </svg>
                                </button>
                                <div class="relative flex-shrink-0">
                                    <img :src="conversations[selectedConv].avatar" :alt="conversations[selectedConv].name" class="w-9 h-9 rounded-full" />
                                    <span
                                        class="absolute bottom-0 right-0 w-2.5 h-2.5 rounded-full border-2 border-white dark:border-slate-800"
                                        :class="conversations[selectedConv].online ? 'bg-success dark:bg-success-dark' : 'bg-slate-300 dark:bg-slate-600'"
                                    ></span>
                                </div>
                                <div>
                                    <p class="font-semibold text-sm text-slate-900 dark:text-slate-100" x-text="conversations[selectedConv].name"></p>
                                    <p class="text-xs" :class="conversations[selectedConv].online ? 'text-success dark:text-success-dark' : 'text-slate-400 dark:text-slate-500'" x-text="conversations[selectedConv].online ? 'Online' : 'Offline'"></p>
                                </div>
                                <div class="ml-auto flex items-center gap-2">
                                    <button class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400" aria-label="Call">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                            <path d="M5 4h4l2 5l-2.5 1.5a11 11 0 0 0 5 5l1.5 -2.5l5 2v4a2 2 0 0 1 -2 2a16 16 0 0 1 -15 -15a2 2 0 0 1 2 -2" />
                                        </svg>
                                    </button>
                                    <button class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400" aria-label="More options">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                            <path d="M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                                            <path d="M12 19m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                                            <path d="M12 5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                                        </svg>
                                    </button>
                                </div>
                            </div>

                            <!-- Messages -->
                            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                                <template x-for="msg in conversations[selectedConv].messages" :key="msg.id">
                                    <div :class="msg.sent ? 'flex justify-end' : 'flex justify-start'">
                                        <div :class="msg.sent ? 'max-w-xs lg:max-w-md' : 'max-w-xs lg:max-w-md'">
                                            <div
                                                class="px-4 py-2.5 rounded-2xl text-sm"
                                                :class="msg.sent
                                                    ? 'bg-primary text-white rounded-br-sm'
                                                    : 'bg-slate-100 dark:bg-slate-700 text-slate-800 dark:text-slate-200 rounded-bl-sm'"
                                                x-text="msg.text"
                                            ></div>
                                            <p class="mt-1 text-xs text-slate-400 dark:text-slate-500" :class="msg.sent ? 'text-right' : 'text-left'" x-text="msg.time"></p>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Message Input -->
                            <div class="px-4 py-3 border-t border-slate-200 dark:border-slate-700">
                                <form @submit.prevent="sendMessage()" class="flex items-center gap-2">
                                    <input
                                        type="text"
                                        x-model="newMessage"
                                        placeholder="Type a message..."
                                        class="input flex-1 text-sm"
                                    />
                                    <button
                                        type="submit"
                                        class="button button-primary flex-shrink-0 px-4 py-2"
                                        aria-label="Send message"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                            <path d="M10 14l11 -11" />
                                            <path d="M21 3l-6.5 18a.55 .55 0 0 1 -1 0l-3.5 -7l-7 -3.5a.55 .55 0 0 1 0 -1l18 -6.5" />
                                        </svg>
                                        <span class="ml-1">Send</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- /Main Content -->

            <!-- Mobile Bottom Menu Button -->
            <div
                x-show="isMobile"
                x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0"
                x-transition:enter-end="opacity-100"
                class="mobile-menu lg:hidden"
            >
                <button @click="mobileMenuOpen = !mobileMenuOpen" class="flex items-center space-x-2 px-4 py-2 rounded-lg bg-primary text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-layout-dashboard">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M5 4h4a1 1 0 0 1 1 1v6a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1v-6a1 1 0 0 1 1 -1" />
                        <path d="M5 16h4a1 1 0 0 1 1 1v2a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1v-2a1 1 0 0 1 1 -1" />
                        <path d="M15 12h4a1 1 0 0 1 1 1v6a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1v-6a1 1 0 0 1 1 -1" />
                        <path d="M15 4h4a1 1 0 0 1 1 1v2a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1v-2a1 1 0 0 1 1 -1" />
                    </svg>
                    <span class="text-sm font-medium">Menu</span>
                </button>
            </div>

            <!-- Mobile Menu Popup -->
            <div
                x-show="isMobile && mobileMenuOpen"
                x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 translate-y-8"
                x-transition:enter-end="opacity-100 translate-y-0"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-y-0"
                x-transition:leave-end="opacity-0 translate-y-8"
                @click.away="mobileMenuOpen = false"
                class="mobile-menu-popup lg:hidden"
            >
                <div class="space-y-1 py-2">
                    <a href="/src/dashboard/dashboard.html" class="flex items-center space-x-3 px-4 py-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M10 12h4v4h-4z"/></svg>
                        <span>Dashboard</span>
                    </a>
                    <a href="/src/pages/index.html" class="flex items-center space-x-3 px-4 py-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon h-5 w-5"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 4m0 2a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2z"/><path d="M7 8h10"/><path d="M7 12h10"/><path d="M7 16h10"/></svg>
                        <span>Pages</span>
                    </a>
                </div>
            </div>
        </main>
    </body>
</html>
