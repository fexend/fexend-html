<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .header {
            font-size: 20px;
            font-weight: bold;
            color: #615fff;
            text-align: center;
        }

        .content {
            font-size: 16px;
            color: #333333;
            margin-top: 10px;
            text-align: center;
        }

        .button {
            display: inline-block;
            background: #615fff;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            margin-top: 20px;
            border-radius: 5px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            text-align: center;
            color: #888888;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">Email Verification</div>
        <div class="content">
            <p>Hi John Doe,</p>
            <p>Thank you for registering with us! Please click the button below to verify your email address.</p>
            <a href="#" class="button">Verify Email</a>
            <p>If you did not create an account, no further action is required.</p>
        </div>
        <div class="footer">&copy; 2026 Fexend. All rights reserved.</div>
    </div>
</body>

</html>
